<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA MOVE SHOW</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10813439' data-sdk='show_10813439'></script>
    <style>
        :root { --primary: #00e6ff; }
        
        /* 🌈 কালারফুল লাইটিক ব্যাকগ্রাউন্ড */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; 
            padding: 15px; 
            min-height: 100vh;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            padding: 0 5px;
        }

        .logo { font-size: 24px; font-weight: bold; text-shadow: 0 0 10px var(--primary); }
        .logo span { color: var(--primary); }

        /* 👤 ইউজার নেম স্টাইল */
        .user-info {
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--primary);
        }

        /* 🔍 সার্চ বার */
        .search-container { margin-bottom: 25px; }
        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
            border: 1px solid rgba(0, 230, 255, 0.3);
            box-sizing: border-box;
        }

        /* ✨ ভিডিও কার্ড ও মোটা রঙিন বর্ডার */
        .video-card { 
            background: #111; 
            border-radius: 18px; 
            margin-bottom: 30px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: 0.3s;
            position: relative;
            padding: 4px; /* বর্ডার দেখানোর জন্য স্পেস */
            background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: borderGlow 20s linear infinite;
        }

        @keyframes borderGlow {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        .inner-card {
            background: #111;
            border-radius: 14px;
            overflow: hidden;
        }

        .thumb { position: relative; height: 210px; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        
        .play { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--primary); color: #000; width: 55px; height: 55px; 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-size: 22px; box-shadow: 0 0 20px var(--primary); 
        }

        .info { padding: 15px; text-align: center; font-weight: bold; font-size: 16px; }

        /* Modal & Player */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #player-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 90vh; border: none; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 35px; color: #fff; cursor: pointer; z-index: 10001; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SA <span>MOVE</span></div>
        <div id="user-display" class="user-info">Guest</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search Episodes (57-80)..." onkeyup="filterEpisodes()">
    </div>

    <div id="grid"></div>

    <div id="modal">
        <span class="close" onclick="closePlayer()">✕</span>
        <div id="player-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ইউজার নেম সেট করা
        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('user-display').innerText = user.first_name || "User";
        }

        const linkGroup1 = "https://dl.springsfern.in/wt/AAAAAbjepQNS-EhPAAAfDg/0QhSeBvOSNAH27EEDv5Li3KraHhzxO59Tg_GuuP4VY8";
        const linkGroup2 = "https://dl.springsfern.in/wt/AAAAAbjepQNQKdhdAAAdlQ/2vdrL8Du9-Y0YaruJdjWVYoGfKUVQx87NpY6SFBwpZ0";
        const linkGroup3 = "https://dl.springsfern.in/wt/AAAAAbjepQNR8Oa5AAAwLw/xGBH0nYS-HP7IasOY4uwTQ5QWNvqghgD5710WXhzqpE";

        const videos = [];
        for (let i = 57; i <= 80; i++) {
            let currentLink = "";
            if (i <= 64) currentLink = linkGroup1;
            else if (i <= 72) currentLink = linkGroup2;
            else currentLink = linkGroup3;

            videos.push({
                id: i,
                title: `Bachelor Point Episode ${i}`,
                link: currentLink,
                thumb: `thumbs/${i}.jpg`
            });
        }

        function load(data) {
            document.getElementById("grid").innerHTML = data.map(v => `
                <div class="video-card" onclick="handlePlayClick('${v.link}')">
                    <div class="inner-card">
                        <div class="thumb">
                            <img src="${v.thumb}" onerror="this.src='https://via.placeholder.com/400x200/111/00e6ff?text=Bachelor+Point+${v.id}'">
                            <div class="play">▶</div>
                        </div>
                        <div class="info">${v.title}</div>
                    </div>
                </div>
            `).join('');
        }

        // সার্চ ফাংশন
        function filterEpisodes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = videos.filter(v => v.title.toLowerCase().includes(query) || v.id.toString().includes(query));
            load(filtered);
        }

        function handlePlayClick(url) {
            if (!url) return;
            if (typeof show_10813439 === 'function') {
                show_10813439().then(() => { openModal(url); }).catch(() => { openModal(url); });
            } else { openModal(url); }
        }

        function openModal(url) {
            document.getElementById("modal").style.display = "block";
            document.getElementById("player-container").innerHTML = `
                <iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>
            `;
        }

        function closePlayer() {
            document.getElementById("player-container").innerHTML = "";
            document.getElementById("modal").style.display = "none";
        }

        load(videos);
    </script>
</body>
</html>
