<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA MOVE SHOW</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Monetag SDK (UNCHANGED) -->
<script src='//libtl.com/sdk.js' data-zone='10805128' data-sdk='show_10805128'></script>

<style>
:root {
    --primary: #00e6ff;
    --bg: #000;
}

body {
    margin:0;
    font-family: sans-serif;
    background:#000;
    color:#fff;
    padding:15px;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logo {
    font-size:22px;
    font-weight:bold;
}
.logo span {
    color:var(--primary);
}

.user-profile {
    display:flex;
    align-items:center;
    gap:8px;
    background:#111;
    padding:5px 12px;
    border-radius:20px;
}

.user-profile img {
    width:25px;
    height:25px;
    border-radius:50%;
}

/* SEARCH */
.search-container input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#111;
    color:#fff;
}

/* CARD */
.video-card {
    background:#111;
    border-radius:15px;
    margin-bottom:20px;
    overflow:hidden;
}

.thumb {
    position:relative;
    height:200px;
}
.thumb img {
    width:100%;
    height:100%;
    object-fit:cover;
}
.play {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#00e6ff;
    color:#000;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.info {
    padding:12px;
    font-size:14px;
}

.stats {
    font-size:12px;
    color:#aaa;
    margin-top:5px;
}

.btns {
    display:flex;
    gap:10px;
    margin-top:10px;
}

.btn-watch {
    flex:2;
    background:#00e6ff;
    border:none;
    padding:10px;
    border-radius:8px;
}

.btn-share {
    flex:1;
    background:#222;
    border:none;
    color:#fff;
    border-radius:8px;
}

/* PLAYER */
#modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
}

video {
    width:100%;
    margin-top:20%;
}

.close {
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">SA <span>MOVE</span></div>
    <div class="user-profile">
        <span id="name">User</span>
        <img id="pic" src="">
    </div>
</div>

<div class="search-container">
    <input type="text" id="search" placeholder="Search episode..." onkeyup="filterVideos()">
</div>

<div id="grid"></div>

<!-- PLAYER -->
<div id="modal">
    <span class="close" onclick="closePlayer()">✕</span>
    <video id="player" controls></video>
</div>

<script>
// TELEGRAM USER
const tg = window.Telegram.WebApp;
tg.expand();

if(tg.initDataUnsafe.user){
    document.getElementById("name").innerText = tg.initDataUnsafe.user.first_name;
    if(tg.initDataUnsafe.user.photo_url){
        document.getElementById("pic").src = tg.initDataUnsafe.user.photo_url;
    }
}

// FORMAT VIEWS
function formatViews(num){
    if(num>=1000000) return (num/1000000).toFixed(1)+"M views";
    if(num>=1000) return Math.floor(num/1000)+"K views";
    return num+" views";
}

// DATA
const videos = [];

for(let i=1;i<=80;i++){
    let views = Math.floor(Math.random()*80000)+20000; // 20K-100K
    let likes = Math.floor(views*(Math.random()*0.08+0.02)); // কম likes

    videos.push({
        id:i,
        title:`Episode ${i}`,
        video:`./videos/${i}.mp4`,
        thumb:`https://via.placeholder.com/400x200?text=EP+${i}`,
        views: formatViews(views),
        likes: likes.toLocaleString()+" likes"
    });
}

// LOAD
function load(data){
    document.getElementById("grid").innerHTML = data.map(v=>`
        <div class="video-card">
            <div class="thumb" onclick="playVideo('${v.video}')">
                <img src="${v.thumb}">
                <div class="play">▶</div>
            </div>
            <div class="info">
                <b>${v.title}</b>
                <div class="stats">👁️ ${v.views} • ❤️ ${v.likes}</div>
                <div class="btns">
                    <button class="btn-watch" onclick="playVideo('${v.video}')">Watch</button>
                    <button class="btn-share" onclick="share('${v.title}')">Share</button>
                </div>
            </div>
        </div>
    `).join('');
}

// SEARCH
function filterVideos(){
    let val = document.getElementById("search").value.toLowerCase();
    let f = videos.filter(v => v.title.toLowerCase().includes(val) || v.id == val);
    load(f);
}

// SHARE
function share(title){
    window.open(`https://t.me/share/url?url=https://t.me/your_bot&text=Watch ${title}`);
}

// MONETAG AD (UNCHANGED BUT DEBUG ADDED)
function playVideo(src){
    console.log("Play clicked");

    if(typeof show_10805128 === 'function'){
        console.log("Ad available");

        show_10805128()
        .then(() => {
            console.log("Ad watched");
            start(src);
        })
        .catch((e) => {
            console.log("Ad failed:", e);
            start(src);
        });

    } else {
        console.log("Ad NOT loaded");
        start(src);
    }
}

// START VIDEO
function start(src){
    document.getElementById("modal").style.display="block";
    let p = document.getElementById("player");
    p.src = src;
    p.play();
}

// CLOSE
function closePlayer(){
    let p = document.getElementById("player");
    p.pause();
    p.src="";
    document.getElementById("modal").style.display="none";
}

load(videos);
</script>

</body>
</html>
