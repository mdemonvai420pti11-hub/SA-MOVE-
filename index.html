<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA MOVE SHOW</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10813439' data-sdk='show_10813439'></script>
    <style>
        :root { --primary: #00e6ff; }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; 
            padding: 15px; 
            min-height: 100vh;
        }

        /* 🔒 Channel Lock Overlay */
        #lock-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .lock-box {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            max-width: 400px;
            width: 100%;
        }

        .lock-box h2 { color: var(--primary); margin-bottom: 15px; }
        .lock-box p { font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

        .lock-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            color: #fff;
            transition: 0.3s;
            border: none;
        }

        .btn-yt { background: #ff0000; }
        .btn-tg { background: #0088cc; }
        .btn-fb { background: #1877F2; } /* ফেসবুকের জন্য নীল কালার */
        .btn-done { background: var(--primary); margin-top: 20px; cursor: pointer; color: #000; }

        /* ✨ ইউনিক লোগো ডিজাইন */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px; }
        
        .logo { 
            font-size: 26px; 
            font-weight: 900; 
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff 20%, var(--primary) 40%, var(--primary) 60%, #fff 80%);
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 5px rgba(0, 230, 255, 0.5));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .user-info { font-size: 14px; background: rgba(255, 255, 255, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--primary); }
        .search-container { margin-bottom: 25px; }
        .search-container input { width: 100%; padding: 12px 20px; border-radius: 25px; border: none; background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 16px; outline: none; border: 1px solid rgba(0, 230, 255, 0.3); box-sizing: border-box; }

        .video-card { 
            background: #111; border-radius: 18px; margin-bottom: 30px; overflow: hidden; cursor: pointer; transition: 0.3s;
            position: relative; padding: 5px; background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%; animation: borderGlow 20s linear infinite;
        }

        @keyframes borderGlow { 0% { background-position: 0 0; } 50% { background-position: 400% 0; } 100% { background-position: 0 0; } }
        .inner-card { background: #111; border-radius: 14px; overflow: hidden; }
        .thumb { position: relative; height: 210px; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--primary); color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; box-shadow: 0 0 20px var(--primary); }
        .info { padding: 15px; text-align: center; font-weight: bold; font-size: 16px; }

        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #player-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 90vh; border: none; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 35px; color: #fff; cursor: pointer; z-index: 10001; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <div class="lock-box">
            <h2>চ্যানেল লক! 🔒</h2>
            <p>ভিডিও দেখতে হলে আমাদের ইউটিউব, টেলিগ্রাম এবং ফেসবুক পেজে জয়েন/ফলো করতে হবে।</p>
            <a href="https://www.youtube.com/@SajidAhmod-l7w" target="_blank" class="lock-btn btn-yt" onclick="markJoined('yt')">YouTube সাবস্ক্রাইব করুন</a>
            <a href="https://t.me/+nTwdyOPjMU44Zjll" target="_blank" class="lock-btn btn-tg" onclick="markJoined('tg')">Telegram জয়েন করুন</a>
            <a href="https://www.facebook.com/share/14ZQjmz1MrK/" target="_blank" class="lock-btn btn-fb" onclick="markJoined('fb')">Facebook ফলো করুন</a>
            <button class="lock-btn btn-done" onclick="checkLock()">আমি জয়েন করেছি (Done)</button>
        </div>
    </div>

    <div class="header">
        <div class="logo">SA MOVE SHOW</div>
        <div id="user-display" class="user-info">Guest</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search Episodes (65-80)..." onkeyup="filterEpisodes()">
    </div>

    <div id="grid"></div>

    <div id="modal">
        <span class="close" onclick="closePlayer()">✕</span>
        <div id="player-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let joinedYT = localStorage.getItem('joinedYT') === 'true';
        let joinedTG = localStorage.getItem('joinedTG') === 'true';
        let joinedFB = localStorage.getItem('joinedFB') === 'true';

        function markJoined(type) {
            if(type === 'yt') { joinedYT = true; localStorage.setItem('joinedYT', 'true'); }
            if(type === 'tg') { joinedTG = true; localStorage.setItem('joinedTG', 'true'); }
            if(type === 'fb') { joinedFB = true; localStorage.setItem('joinedFB', 'true'); }
        }

        function checkLock() {
            if(joinedYT && joinedTG && joinedFB) {
                document.getElementById('lock-overlay').style.display = 'none';
            } else {
                alert("দয়া করে সবগুলো চ্যানেলে জয়েন এবং পেজে ফলো করুন!");
            }
        }

        if(joinedYT && joinedTG && joinedFB) {
            document.getElementById('lock-overlay').style.display = 'none';
        }

        const user = tg.initDataUnsafe.user;
        if (user) { document.getElementById('user-display').innerText = user.first_name || "User"; }

        // New Episode Links (65-80)
        const episodeLinks = {
            65: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfuA/lYloQjMbcbg51sK0uNoynb4mw8GyY4oz1JUroy9q6Aw",
            66: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfwA/dNc_kW5C0lM96mnd23AsK0GWBcp69PrIuhHyI-sV8i4",
            67: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfwQ/RS4dE-cWTpzz67opBuppVuuwf_cjXjUUPl6LyIF3LrY",
            68: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfxQ/5pG-kiVvhfScGy88qUYkscXJJBAPwxUgcs2A5uUNBfw",
            69: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfxg/HDOqfvyXkn3HOi55Msf42KBbN6l-cGdVslpRUc6Yq8A",
            70: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfxw/lfK2muc1n_W7iNfV_uO4JGQzWlb7EWsoIMZ9EOKlPkQ",
            71: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfyA/dx9mg9bT4wKAJUwAPDOBKnRbZgpApKnKh06Q4y0PDUQ",
            72: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfyQ/Syx0q4VXl1iN1etYp0GYU94L8y1uYKnRY3Zdv2cyIfA",
            73: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAfzw/SKJgmpazeLjd8VUstT63IbJJTr9HQhZ70URqxnWWp1w",
            74: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAf0A/GT8kWhjPW33sht_aRZ71NYbmQIg-V5NshdJnz_gZa-0",
            75: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAf0g/WDmahM44USvvNbNwuB-JugZKcC6pmNodhP6lciSU1GU",
            76: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAf1A/DPkLP581mGnYU3sQYfWhUPp3N38OG_76Edsvq7S-7AQ",
            77: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAf4Q/VMud8UP-G9cIUyHTbOznL0-nnvDqI1C8QKoFJugDWcs",
            78: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAf4g/ft9yhiWxogGFhnsL6P8ISoDo0B-9xbsISE50CAVnpMc",
            79: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAf4w/tTPIJ008Bud7hp0WDokEfUHinJgKofF_-7ZtUHL-rmI",
            80: "https://dl.springsfern.in/wt/AAAAAcOP04BWiM2IAAAf5A/6EA3OqCAVzuUV5IWcOlCyF0-L-mp2lB6rrHbltZf2Dw"
        };

        const videos = [];
        for (let i = 65; i <= 80; i++) {
            videos.push({ 
                id: i, 
                title: `Bachelor Point Episode ${i}`, 
                link: episodeLinks[i], 
                thumb: `thumbs/${i}.jpg` 
            });
        }

        function load(data) {
            document.getElementById("grid").innerHTML = data.map(v => `
                <div class="video-card" onclick="handlePlayClick('${v.link}')">
                    <div class="inner-card">
                        <div class="thumb">
                            <img src="${v.thumb}" onerror="this.src='https://via.placeholder.com/400x200/111/00e6ff?text=Bachelor+Point+${v.id}'">
                            <div class="play">▶</div>
                        </div>
                        <div class="info">${v.title}</div>
                    </div>
                </div>
            `).join('');
        }

        function filterEpisodes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = videos.filter(v => v.title.toLowerCase().includes(query) || v.id.toString().includes(query));
            load(filtered);
        }

        function handlePlayClick(url) {
            if (!url) return;
            if (typeof show_10813439 === 'function') {
                show_10813439().then(() => { openModal(url); }).catch(() => { openModal(url); });
            } else { openModal(url); }
        }

        function openModal(url) {
            document.getElementById("modal").style.display = "block";
            document.getElementById("player-container").innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        }

        function closePlayer() {
            document.getElementById("player-container").innerHTML = "";
            document.getElementById("modal").style.display = "none";
        }

        load(videos);
    </script>
</body>
</html>
