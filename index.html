<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA MOVE SHOW</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10813439' data-sdk='show_10813439'></script>
    <style>
        :root { --primary: #00e6ff; --bg: #000; }
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 22px; font-weight: bold; }
        .logo span { color: var(--primary); }
        .video-card { background: #111; border-radius: 15px; margin-bottom: 20px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .video-card:active { transform: scale(0.98); }
        .thumb { position: relative; height: 200px; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--primary); color: #000; width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 0 15px var(--primary); }
        .info { padding: 15px; text-align: center; font-weight: bold; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #player-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 90vh; border: none; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 35px; color: #fff; cursor: pointer; z-index: 10001; }

        /* ✨ Colorful Glow Border Animation (Only Added Part) */
        .video-card {
            position: relative;
            z-index: 1;
        }

        .video-card::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 15px;
            background: linear-gradient(45deg, red, orange, yellow, lime, cyan, blue, violet, red);
            background-size: 400%;
            z-index: -1;
            filter: blur(8px);
            animation: glowMove 6s linear infinite;
        }

        .video-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 15px;
            background: #111;
            z-index: -1;
        }

        @keyframes glowMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .video-card:hover::before {
            filter: blur(12px);
        }
    </style>
</head>
<body>
    <div class="header"><div class="logo">SA <span>MOVE</span></div></div>
    <div id="grid"></div>

    <div id="modal">
        <span class="close" onclick="closePlayer()">✕</span>
        <div id="player-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const linkGroup1 = "https://dl.springsfern.in/wt/AAAAAbjepQNS-EhPAAAfDg/0QhSeBvOSNAH27EEDv5Li3KraHhzxO59Tg_GuuP4VY8";
        const linkGroup2 = "https://dl.springsfern.in/wt/AAAAAbjepQNQKdhdAAAdlQ/2vdrL8Du9-Y0YaruJdjWVYoGfKUVQx87NpY6SFBwpZ0";
        const linkGroup3 = "https://dl.springsfern.in/wt/AAAAAbjepQNR8Oa5AAAwLw/xGBH0nYS-HP7IasOY4uwTQ5QWNvqghgD5710WXhzqpE";

        const videos = [];
        for (let i = 57; i <= 80; i++) {
            let currentLink = "";
            if (i <= 64) currentLink = linkGroup1;
            else if (i <= 72) currentLink = linkGroup2;
            else currentLink = linkGroup3;

            videos.push({
                id: i,
                title: `Bachelor Point Episode ${i}`,
                link: currentLink,
                thumb: `thumbs/${i}.jpg`
            });
        }

        function load(data) {
            document.getElementById("grid").innerHTML = data.map(v => `
                <div class="video-card" onclick="handlePlayClick('${v.link}')">
                    <div class="thumb">
                        <img src="${v.thumb}" onerror="this.src='https://via.placeholder.com/400x200?text=Episode+${v.id}'">
                        <div class="play">▶</div>
                    </div>
                    <div class="info">${v.title}</div>
                </div>
            `).join('');
        }

        function handlePlayClick(url) {
            if (!url) return;
            
            if (typeof show_10813439 === 'function') {
                show_10813439().then(() => {
                    openModal(url);
                }).catch((e) => {
                    console.error("Ad error:", e);
                    openModal(url);
                });
            } else {
                openModal(url);
            }
        }

        function openModal(url) {
            document.getElementById("modal").style.display = "block";
            document.getElementById("player-container").innerHTML = `
                <iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>
            `;
        }

        function closePlayer() {
            document.getElementById("player-container").innerHTML = "";
            document.getElementById("modal").style.display = "none";
        }

        load(videos);
    </script>
</body>
</html>
