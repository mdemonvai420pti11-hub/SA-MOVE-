<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA MOVE SHOW</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10813439' data-sdk='show_10813439'></script>
    <style>
        :root { --primary: #00e6ff; --bg: #000; }
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 22px; font-weight: bold; }
        .logo span { color: var(--primary); }
        .user-profile { display: flex; align-items: center; gap: 8px; background: #111; padding: 5px 12px; border-radius: 20px; }
        .user-profile img { width: 25px; height: 25px; border-radius: 50%; }
        .search-container input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #111; color: #fff; box-sizing: border-box; }
        .video-card { background: #111; border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        .thumb { position: relative; height: 200px; cursor: pointer; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .play { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #00e6ff; color: #000; width: 55px; height: 55px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .info { padding: 12px; font-size: 14px; }
        .stats { font-size: 12px; color: #aaa; margin-top: 5px; }
        .btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-watch { flex: 2; background: #00e6ff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #player-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 80vh; border: none; }
        .close { position: absolute; top: 20px; right: 20px; font-size: 35px; color: #fff; cursor: pointer; z-index: 10000; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SA <span>MOVE</span></div>
        <div class="user-profile">
            <span id="name">User</span>
            <img id="pic" src="https://via.placeholder.com/25">
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search episode (57-80)..." onkeyup="filterVideos()">
    </div>
    <div id="grid"></div>

    <div id="modal">
        <span class="close" onclick="closePlayer()">✕</span>
        <div id="player-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.initDataUnsafe.user) {
            document.getElementById("name").innerText = tg.initDataUnsafe.user.first_name;
            if (tg.initDataUnsafe.user.photo_url) {
                document.getElementById("pic").src = tg.initDataUnsafe.user.photo_url;
            }
        }

        // ৫৭ থেকে ৮০ পর্যন্ত প্রতিটি পর্বে আপনার দেওয়া এই ভিডিওটি সেট করা হয়েছে
        const defaultId = "niLM7NpovxY";
        const youtubeLinks = {};
        for (let i = 57; i <= 80; i++) {
            youtubeLinks[i] = defaultId;
        }

        const videos = [];
        for (let i = 57; i <= 80; i++) {
            videos.push({
                id: i,
                title: `Bachelor Point Episode ${i}`,
                youtubeId: youtubeLinks[i],
                thumbPath: `Thumbs/${i}.jpg`, 
                views: (Math.floor(Math.random() * 80) + 20) + "K views"
            });
        }

        function load(data) {
            document.getElementById("grid").innerHTML = data.map(v => `
                <div class="video-card">
                    <div class="thumb" onclick="playVideo('${v.youtubeId}')">
                        <img src="${v.thumbPath}" onerror="this.src='https://via.placeholder.com/400x200?text=Episode+${v.id}'">
                        <div class="play">▶</div>
                    </div>
                    <div class="info">
                        <b>${v.title}</b>
                        <div class="stats">👁️ ${v.views}</div>
                        <div class="btns">
                            <button class="btn-watch" onclick="playVideo('${v.youtubeId}')">WATCH NOW</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function playVideo(id) {
            if (typeof show_10813439 === 'function') {
                show_10813439().then(() => { start(id); }).catch(() => { start(id); });
            } else { start(id); }
        }

        function start(id) {
            document.getElementById("modal").style.display = "block";
            // www.youtube-nocookie.com ব্যবহার করা হয়েছে
            document.getElementById("player-container").innerHTML = 
                `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        }

        function closePlayer() {
            document.getElementById("player-container").innerHTML = "";
            document.getElementById("modal").style.display = "none";
        }

        function filterVideos() {
            let val = document.getElementById("search").value.toLowerCase();
            load(videos.filter(v => v.id == val || v.title.toLowerCase().includes(val)));
        }

        load(videos);
    </script>
</body>
    </html>
